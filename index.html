<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Spray Calculator</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 20px;
    }
    input {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #e0e0e0;
    }
  </style>
</head>
<body>

<h1>Drone Spray Calculator</h1>

<label>Spray Distance (m)</label>
<input type="number" id="distance" placeholder="e.g. 100" />

<table>
  <thead>
    <tr>
      <th>Speed (m/s)</th>
      <th>Time (sec)</th>
    </tr>
  </thead>
  <tbody id="result"></tbody>
</table>

<script>
  const distanceInput = document.getElementById("distance");
  const result = document.getElementById("result");

  distanceInput.addEventListener("input", () => {
    const D = parseFloat(distanceInput.value);
    result.innerHTML = "";

    if (!D || D <= 0) return;

    for (let v = 1.0; v <= 3.0; v += 0.2) {
      const time = (D / v).toFixed(1);

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${v.toFixed(1)}</td>
        <td>${time}</td>
      `;
      result.appendChild(row);
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
